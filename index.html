<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Government Secure Login</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(to right, #003366, #0055aa);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
   .login-container {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
      width: 400px;
      padding: 30px;
      text-align: center;
    }

    .header {
      margin-bottom: 20px;
    }

    .header img {
      width: 60px;
      margin-bottom: 10px;
    }

    .header h2 {
      color: #003366;
      margin: 0;
    }

    .form-group {
      margin: 15px 0;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
      color: #333;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #003366;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn:hover {
      background: #0055aa;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #555;
    }

    .alert {
      margin-top: 10px;
      color: red;
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="header">
      <!-- Placeholder for emblem/logo -->
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Emblem_of_India.svg/120px-Emblem_of_India.svg.png" alt="Govt Emblem">
      <h2>Government Secure Login</h2>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username / ID</label>
        <input type="text" id="username" placeholder="Enter your ID" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn">Login</button>
      <p class="alert" id="alertMsg">⚠️ Please fill in all fields</p>
    </form>
    <div class="footer">
      © 2026 Government of India | Secure Portal
    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const alertMsg = document.getElementById("alertMsg");

    form.addEventListener("submit", function(event) {
      event.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (username === "" || password === "") {
        alertMsg.style.display = "block";
      } else {
        alertMsg.style.display = "none";
        alert("✅ Login Successful (Frontend Demo)");
      }
    });
  </script>
</body>
</html>
